name: Lint

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ruff:
    name: Python lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ruff
        uses: astral-sh/ruff-action@v3

  xml-validate:
    name: Validate XML schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install libxml2-utils
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils

      - name: Validate GSettings schema
        run: |
          xmllint --noout \
            gnome-extension/schemas/org.gnome.shell.extensions.whisper-npu.gschema.xml

      - name: Validate KDE config XML
        run: |
          xmllint --noout \
            kde-plasmoid/contents/config/main.xml

  js-syntax:
    name: JavaScript syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check GNOME extension JS syntax
        run: |
          for f in gnome-extension/*.js; do
            echo "Checking $f..."
            node --check "$f" 2>&1 || true
          done

  shellcheck:
    name: Shell script lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Find and check shell scripts
        run: |
          shopt -s globstar nullglob
          scripts=($(find . -name '*.sh' -not -path './.git/*'))
          if [ ${#scripts[@]} -eq 0 ]; then
            echo "No shell scripts found, skipping"
            exit 0
          fi
          shellcheck "${scripts[@]}"
