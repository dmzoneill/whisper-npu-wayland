[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W"]
ignore = [
    "E402",  # module-import-not-at-top-of-file (evdev/aiohttp deferred imports)
    "E501",  # line-too-long (handled by line-length setting)
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["F841"]  # unused variables common in test fixtures
